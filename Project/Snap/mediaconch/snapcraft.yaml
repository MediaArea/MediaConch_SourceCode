base: core24

name: mediaconch
title: MediaConch CLI
version: '25.04'
summary: Implementation checker and policy checker for video and audio files (CLI)
description: |
  MediaConch is an implementation checker, policy checker, reporter,
  and fixer that targets preservation-level audiovisual files
  (specifically Matroska, Linear Pulse Code Modulation (LPCM)
  and FF Video Codec 1 (FFV1)).

  This project is maintained by MediaArea and funded by PREFORMA.
license: BSD-2-Clause
contact: info@mediaarea.net
website: https://mediaarea.net/MediaConch
source-code: https://github.com/MediaArea/MediaConch_SourceCode
issues: https://github.com/MediaArea/MediaConch_SourceCode/issues
confinement: strict
grade: stable

lint:
  ignore:
    - classic
    - library:
      - usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libmms.*

apps:
  mediaconch:
    command: usr/bin/mediaconch
    plugs:
      - home
      - network
      - removable-media

parts:
  mediaconch:
    plugin: autotools
    source: MediaConch
    source-subdir: Project/GNU/CLI
    autotools-configure-parameters:
      - --prefix=/usr
    build-packages:
      - zlib1g-dev
      - libxml2-dev
      - libxslt1-dev
      - libevent-dev
      - libsqlite3-dev
      - libjansson-dev
      - libcurl4-openssl-dev
    stage-packages:
      - libcurl4t64
      - libmms0
      - libicu74
      - libjansson4
      - libxml2
      - libxslt1.1
    prime:
      - usr/bin/mediaconch
      - usr/lib/*
    after:
      - libmediainfo
      - libzen
      - build-essential

  libmediainfo:
    plugin: autotools
    source: MediaInfoLib
    source-subdir: Project/GNU/Library
    autotools-configure-parameters:
      - --prefix=/usr
      - --enable-shared
      - --disable-static
      - --with-libcurl
      - --with-libmms
    build-packages:
      - libcurl4-openssl-dev
      - libmms-dev
      - zlib1g-dev
    after:
      - libzen
      - build-essential
    prime:
      - usr/lib/libmediainfo.*

  libzen:
    plugin: autotools
    source: ZenLib
    source-subdir: Project/GNU/Library
    autotools-configure-parameters:
      - --prefix=/usr
      - --enable-shared
      - --disable-static
    after:
      - build-essential
    prime:
      - usr/lib/libzen.*

  build-essential:
    plugin: nil
    build-packages:
      - build-essential
      - pkgconf
